name: Terraform Plan

on:
  push:
    branches: [ main ]
    paths:
      - 'infra/**'
  workflow_dispatch: {}

permissions:
  id-token: write      # REQUIRED for OIDC
  contents: read
  pull-requests: write 

env:
  TF_WORKING_DIR: infra
  AWS_REGION: us-east-1

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      #  OIDC-based auth 
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::605731693050:role/GitHubActionsOIDCRole
          role-session-name: gha-terraform-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -out=tfplan.binary

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' # protect apply to main only
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan.binary
